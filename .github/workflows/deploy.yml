name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: worker-runtime/go.sum

      - name: Run Go Tests
        run: |
          cd worker-runtime
          go test -v ./...

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          cd control-plane
          pip install poetry
          poetry config virtualenvs.create false
          poetry install

      - name: Run Python Tests
        run: |
          cd control-plane
          pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Control Plane
      - name: Build and push Control Plane
        uses: docker/build-push-action@v5
        with:
          context: ./control-plane
          push: true
          tags: |
            valerian001/alpha:control-plane-latest
            valerian001/alpha:control-plane-${{ github.sha }}

      # Build Worker Runtime (Context is root to include agents)
      - name: Build and push Worker Runtime
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./worker-runtime/Dockerfile
          push: true
          tags: |
            valerian001/alpha:worker-runtime-latest
            valerian001/alpha:worker-runtime-${{ github.sha }}
