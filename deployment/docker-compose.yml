version: '3.8'

services:
  nats:
    image: nats:2.10-alpine
    container_name: alphaconsole-nats
    restart: always
    command: "-js"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./data/nats:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: alphaconsole-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: alphaconsole-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  control-plane:
    build:
      context: ../control-plane
      dockerfile: Dockerfile
    container_name: alphaconsole-brain
    restart: always
    depends_on:
      - nats
      - qdrant
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NATS_URL=nats://nats:4222
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - VAST_API_KEY=${VAST_API_KEY}
    ports:
      - "8000:8000"

networks:
  default:
    name: alphaconsole-net
