<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task | AgentOps</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080808;
            --surface-elevated: #121212;
            --cyber-blue: #00A3FF;
            --cyber-blue-glow: rgba(0, 163, 255, 0.3);
            --glass-bg: rgba(18, 18, 18, 0.9);
            --border-muted: rgba(255, 255, 255, 0.05);
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('02_dashboard_static.png'); /* Simulated background */
            background-size: cover;
            background-position: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .modal {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            border: 1px solid var(--border-muted);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { font-size: 20px; font-weight: 700; }

        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-field, .textarea-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 14px;
        }

        .textarea-field { height: 120px; resize: none; }

        .agent-pills {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .agent-pill {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-muted);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .agent-pill.active {
            background: var(--cyber-blue);
            border-color: var(--cyber-blue);
            box-shadow: 0 0 10px var(--cyber-blue-glow);
        }

        .modal-footer {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
        }

        .btn-cancel {
            padding: 12px 24px;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-start {
            padding: 12px 32px;
            background: var(--cyber-blue);
            color: white;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 4px 15px var(--cyber-blue-glow);
        }

    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="modal">
        <div class="modal-header">
            <h2>Start New Objective</h2>
        </div>

        <div class="form-group">
            <label>Objective Name</label>
            <input type="text" class="input-field" placeholder="e.g. Implement Auth Workflow">
        </div>

        <div class="form-group">
            <label>Description & Scope</label>
            <textarea class="textarea-field" placeholder="Define exactly what the agents should achieve..."></textarea>
        </div>

        <div class="form-group">
            <label>Assigned Agent Fleet</label>
            <div class="agent-pills">
                <div class="agent-pill active">Planner</div>
                <div class="agent-pill active">Developer</div>
                <div class="agent-pill active">Reviewer</div>
                <div class="agent-pill active">Tester</div>
                <div class="agent-pill">Marketing</div>
            </div>
        </div>

        <div class="modal-footer">
            <a href="02_dashboard.html" class="btn-cancel">Cancel</a>
            <a href="04_approval.html" class="btn-start">Execute Pipeline</a>
        </div>
    </div>
</body>
</html>
