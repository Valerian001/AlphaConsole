<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task | AgentOps</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080808;
            --surface-elevated: #121212;
            --cyber-blue: #00A3FF;
            --cyber-blue-glow: rgba(0, 163, 255, 0.3);
            --glass-bg: rgba(18, 18, 18, 0.9);
            --border-muted: rgba(255, 255, 255, 0.05);
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('02_dashboard_static.png'); /* Simulated background */
            background-size: cover;
            background-position: center;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .modal {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            border: 1px solid var(--border-muted);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { font-size: 20px; font-weight: 700; }
        .modal-header span { font-size: 12px; color: var(--text-secondary); font-weight: 400; }

        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-field, .textarea-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #262626;
            border-radius: 16px;
            padding: 16px;
            color: white;
            font-size: 14px;
            line-height: 1.6;
            transition: 0.3s;
        }

        .textarea-field { height: 200px; resize: none; }
        .textarea-field:focus { border-color: var(--cyber-blue); box-shadow: 0 0 15px var(--cyber-blue-glow); outline: none; }

        /* Multi-Modal Upload Zones */
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 12px;
        }

        .upload-zone {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-muted);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-zone:hover {
            background: rgba(0, 163, 255, 0.05);
            border-color: var(--cyber-blue);
        }

        .upload-zone .icon { font-size: 20px; margin-bottom: 8px; display: block; }
        .upload-zone .label { font-size: 11px; font-weight: 600; color: var(--text-secondary); }

        /* Attachment List Styles */
        .attachment-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 16px;
        }

        .attachment-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-muted);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }

        .attachment-item:hover { border-color: rgba(255, 255, 255, 0.1); }

        .file-info { display: flex; align-items: center; gap: 12px; }
        .file-id {
            background: var(--cyber-blue);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .file-name { font-size: 13px; font-weight: 500; }
        .file-preview {
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .btn-remove {
            background: transparent;
            border: none;
            color: #FF3B3B;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            opacity: 0.6;
            transition: 0.2s;
        }
        .btn-remove:hover { opacity: 1; transform: scale(1.1); }

        .agent-pills {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .agent-pill {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-muted);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .agent-pill.active {
            background: var(--cyber-blue);
            border-color: var(--cyber-blue);
            box-shadow: 0 0 10px var(--cyber-blue-glow);
        }

        .modal-footer {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
        }

        .btn-cancel {
            padding: 12px 24px;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-start {
            padding: 12px 32px;
            background: var(--cyber-blue);
            color: white;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 4px 15px var(--cyber-blue-glow);
        }

    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="modal">
        <div class="modal-header">
            <h2>Project Intake Center</h2>
            <span>Start a comprehensive project objective</span>
        </div>

        <div class="form-group">
            <label>Project Scope & Requirements</label>
            <textarea class="textarea-field" placeholder="Paste your large-scale project requirements, user stories, or technical briefs here..."></textarea>
        </div>

        <div class="form-group">
            <label>Attachments (Multi-Modal Context)</label>
            <div class="upload-grid">
                <div class="upload-zone">
                    <span class="icon">📁</span>
                    <span class="label">Add PDF / Images / Text</span>
                </div>
            </div>

            <!-- Active Attachments with Indexing IDs -->
            <div class="attachment-list">
                <div class="attachment-item">
                    <div class="file-info">
                        <div class="file-preview">📄</div>
                        <div>
                            <div class="file-name">technical_spec_v2.pdf</div>
                            <div class="file-id">DOC-01</div>
                        </div>
                    </div>
                    <button class="btn-remove">×</button>
                </div>
                <div class="attachment-item">
                    <div class="file-info">
                        <div class="file-preview">🖼️</div>
                        <div>
                            <div class="file-name">dashboard_mockup.png</div>
                            <div class="file-id">IMG-01</div>
                        </div>
                    </div>
                    <button class="btn-remove">×</button>
                </div>
            </div>
        </div>

        <div class="planner-note" style="margin-top: 24px;">
            <strong>Pro Tip:</strong> Reference files using their IDs (e.g., <em>"The PDR in DOC-01"</em>) in the project scope above.
        </div>

        <div class="modal-footer">
            <a href="02_dashboard.html" class="btn-cancel">Cancel</a>
            <a href="04_approval.html" class="btn-start">Send to Planner</a>
        </div>
    </div>
</body>
</html>
