<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents | AlphaConsole</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080808;
            --surface-elevated: #121212;
            --cyber-blue: #00A3FF;
            --cyber-blue-glow: rgba(0, 163, 255, 0.2);
            --glass-bg: rgba(18, 18, 18, 0.7);
            --border-muted: rgba(255, 255, 255, 0.05);
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --success: #00E599;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-deep); color: var(--text-primary); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 280px; background: var(--surface-elevated); border-right: 1px solid var(--border-muted); padding: 24px; display: flex; flex-direction: column; gap: 32px; }
        .logo { font-weight: 700; font-size: 20px; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--cyber-blue); }
        .logo-icon { width: 24px; height: 24px; background: var(--cyber-blue); border-radius: 6px; box-shadow: 0 0 10px var(--cyber-blue-glow); }

        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--text-secondary); text-decoration: none; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-item.active { color: var(--cyber-blue); background: rgba(0, 163, 255, 0.05); }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 72px; border-bottom: 1px solid var(--border-muted); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }

        .content-area { flex: 1; padding: 32px; overflow-y: auto; }
        .module-title { font-size: 24px; font-weight: 700; margin-bottom: 32px; }

        .agent-table { width: 100%; border-collapse: collapse; }
        .agent-table th { text-align: left; padding: 16px; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; border-bottom: 1px solid var(--border-muted); }
        .agent-table td { padding: 16px; font-size: 14px; border-bottom: 1px solid var(--border-muted); }

        .agent-id { display: flex; align-items: center; gap: 12px; }
        .agent-icon { width: 32px; height: 32px; background: rgba(0, 163, 255, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--cyber-blue); font-weight: 700; }

        .status-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
        .pulse { width: 8px; height: 8px; background: var(--success); border-radius: 50%; }

        .btn-manage { padding: 6px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-muted); border-radius: 6px; color: white; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon"></div>
            ALPHA<span>CONSOLE</span>
        </div>
        <div class="nav-group">
            <a href="02_dashboard.html" class="nav-item">Dashboard</a>
            <a href="06_workflows.html" class="nav-item">Workflows</a>
            <a href="#" class="nav-item active">Agents</a>
            <a href="08_memory.html" class="nav-item">Memory</a>
            <a href="09_settings.html" class="nav-item">Settings</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="breadcrumb">AlphaConsole / Agents</div>
        </div>

        <div class="content-area">
            <h1 class="module-title">Agent Fleet</h1>
            <table class="agent-table">
                <thead>
                    <tr>
                        <th>Agent Identity</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Load</th>
                        <th>Uptime</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="agent-id">
                                <div class="agent-icon">P</div>
                                <div>Planner-01</div>
                            </div>
                        </td>
                        <td>Planner</td>
                        <td><div class="status-badge"><div class="pulse"></div> Online</div></td>
                        <td>2%</td>
                        <td>14d 2h</td>
                        <td><a href="#" class="btn-manage">Configure</a></td>
                    </tr>
                    <tr>
                        <td>
                            <div class="agent-id">
                                <div class="agent-icon">D</div>
                                <div>Developer-04</div>
                            </div>
                        </td>
                        <td>Developer</td>
                        <td><div class="status-badge"><div class="pulse" style="background: var(--cyber-blue);"></div> Active</div></td>
                        <td>84%</td>
                        <td>2d 12h</td>
                        <td><a href="#" class="btn-manage">Configure</a></td>
                    </tr>
                    <tr>
                        <td>
                            <div class="agent-id">
                                <div class="agent-icon">T</div>
                                <div>Tester-Alpha</div>
                            </div>
                        </td>
                        <td>Tester</td>
                        <td><div class="status-badge"><div class="pulse"></div> Online</div></td>
                        <td>0%</td>
                        <td>4h 30m</td>
                        <td><a href="#" class="btn-manage">Configure</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
