<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objective Complete | AgentOps</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080808;
            --surface-elevated: #121212;
            --cyber-blue: #00A3FF;
            --success: #00E599;
            --success-glow: rgba(0, 229, 153, 0.2);
            --glass-bg: rgba(18, 18, 18, 0.7);
            --border-muted: rgba(255, 255, 255, 0.05);
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .success-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-muted);
            border-radius: 32px;
            padding: 48px;
            text-align: center;
            animation: successPop 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes successPop {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--success-glow);
            border: 2px solid var(--success);
            border-radius: 50%;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--success);
            font-size: 40px;
            box-shadow: 0 0 30px var(--success-glow);
        }

        h1 { font-size: 28px; margin-bottom: 12px; }
        p { color: var(--text-secondary); margin-bottom: 40px; line-height: 1.6; }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            text-align: left;
        }

        .stat-box label { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; }
        .stat-box div { font-size: 18px; font-weight: 700; margin-top: 4px; }

        .btn-return {
            width: 100%;
            background: var(--surface-elevated);
            border: 1px solid var(--border-muted);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            display: block;
            transition: 0.2s;
        }

        .btn-return:hover { background: rgba(255, 255, 255, 0.05); }

    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h1>Objective Achieved</h1>
        <p>The agent fleet has successfully implemented and verified the authentication workflow. All artifacts have been synced to Supabase.</p>

        <div class="stat-grid">
            <div class="stat-box">
                <label>Time Elapsed</label>
                <div>04m 12s</div>
            </div>
            <div class="stat-box">
                <label>Cost (Vast.ai)</label>
                <div>$0.03</div>
            </div>
            <div class="stat-box">
                <label>Files Created</label>
                <div>4</div>
            </div>
            <div class="stat-box">
                <label>Tokens Used</label>
                <div>142k</div>
            </div>
        </div>

        <a href="02_dashboard.html" class="btn-return">Return to Dashboard</a>
    </div>
</body>
</html>
